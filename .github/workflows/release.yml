name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # Build for Linux
  # -------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies for Electron build
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            libgdk-pixbuf2.0-dev \
            libgtk-3-dev \
            libgbm-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux packages
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog since last tag
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create / update release and upload Linux assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Screenshot App ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Intel) | `*-mac.zip` |
            | macOS (Apple Silicon) | `*-arm64-mac.zip` |
            | macOS installer | `*.dmg` / `*-arm64.dmg` |
            | Linux x64 | `*.AppImage` |
            | Linux deb | `*.deb` |
          files: |
            dist/*.AppImage
            dist/*.deb

  # -------------------------------------------------------------------------
  # Build for macOS
  # -------------------------------------------------------------------------
  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS packages
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Create / update release and upload macOS assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Screenshot App ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.dmg
            dist/*-mac.zip
            dist/*-arm64-mac.zip
